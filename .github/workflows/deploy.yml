name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: PHP syntax check
        run: find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" -exec php -l {} \;

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, xml, curl, zip

      - name: Setup environment
        run: cp .env.example .env

      - name: Create Laravel cache directories
        run: mkdir -p bootstrap/cache storage/framework/cache storage/framework/sessions storage/framework/views

      - name: Install dependencies (skip scripts)
        run: composer install --no-dev --optimize-autoloader --no-scripts

      - name: Run package discovery
        run: php artisan package:discover --ansi

      - name: Run migrations
        run: php artisan migrate --force

      - name: Deploy
        run: echo "Deploying..."
